<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flexbox Form</title>
  <link rel="stylesheet" href="m.css">
</head>
<body>

  <form class="form">
    <h2>Registration Form</h2>

    <div class="row">
      <label>Name</label>
      <input type="text">
    </div>

    <div class="row">
      <label>Email</label>
      <input type="email">
    </div>

    <div class="row">
      <label>Password</label>
      <input type="password">
    </div>

    <div class="row">
      <label>Gender</label>
      <select>
        <option>Male</option>
        <option>Female</option>
      </select>
    </div>

    <div class="row">
      <button type="submit">Submit</button>
    </div>
  </form>

</body>
</html>
