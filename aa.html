<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelSite</title>
  <link rel="stylesheet" href="aa.css">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo">TravelSite</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">Destinations</a>
      <a href="#">Login</a>
      <a href="#">Sign Up</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <h1>Discover Your Next Adventure</h1>
    <p>Find hotels, flights, and experiences</p>
    <form class="search-bar">
      <input type="text" placeholder="Where are you going?">
      <input type="date">
      <input type="date">
      <button>Search</button>
    </form>
  </section>

  <!-- Cards Section -->
  <section class="cards-section">
    <h2>Popular Destinations</h2>
    <div class="cards-container">
      <div class="card">
        <img src="https://via.placeholder.com/300x200" alt="Place 1">
        <h3>Paris</h3>
        <p>$120/night</p>
      </div>
      <div class="card">
        <img src="https://via.placeholder.com/300x200" alt="Place 2">
        <h3>New York</h3>
        <p>$150/night</p>
      </div>
      <div class="card">
        <img src="https://via.placeholder.com/300x200" alt="Place 3">
        <h3>Tokyo</h3>
        <p>$200/night</p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 TravelSite. All rights reserved.</p>
  </footer>
</body>
</html>
