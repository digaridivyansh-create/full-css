<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShopEasy Product</title>
</head>

<body>

    <div class="top-bar">
        ShopEasy
    </div>

    <div class="product-card">
        <div class="product-image-container">
            <img src="http://www.clipartbest.com/cliparts/yck/gA5/yckgA5qai.jpg" class="product-image">
        </div>

        <div class="product-name">
            Classic Cotton T-Shirt
        </div>

        <div class="product-description">
            Soft, breathable cotton. Regular fit. Available in multiple colors.
        </div>

        <div class="product-price">
            <span class="current-price">₹799</span>
            <span class="original-price">₹1,199</span>
        </div>

        <button class="add-to-cart-btn">
            Add to Cart
        </button>
    </div>

</body>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #f0f0f0;
    padding: 0;
}

.top-bar {
    width: 100%;
    background-color: #222;
    color: white;
    padding: 15px 0;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 30px;
}

.product-card {
    width: 350px;
    background-color: white;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    padding: 20px;
    text-align: left;
    margin-left: auto;
    margin-right: auto;
    border: 1px solid #ddd;
}

.product-image-container {
    background-color: #f9f9f9;
    border: 1px solid #eee;
    padding: 10px;
    margin-bottom: 15px;
    height: 300px;
    text-align: center;
}

.product-image {
    width: auto;
    height: 100%;
    max-width: 100%;
    display: block;
    margin: auto;
}

.product-name {
    font-size: 18px;
    font-weight: bold;
    color: #333;
    margin-bottom: 5px;
}

.product-description {
    font-size: 14px;
    color: #666;
    margin-bottom: 15px;
    line-height: 1.4;
}

.product-price {
    font-size: 16px;
    color: #333;
    margin-bottom: 20px;
}

.current-price {
    font-weight: bold;
    color: #000;
}

.original-price {
    text-decoration: line-through;
    color: #999;
    margin-left: 8px;
}

.add-to-cart-btn {
    width: 100%;
    padding: 12px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    display: block;
}

.add-to-cart-btn:hover {
    background-color: #0056b3;
}
</style>
</html>
