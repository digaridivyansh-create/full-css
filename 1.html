<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade Calculator</title>
</head>

<body>

<div class="container">

<h1>Grade Calculator</h1>

<form onsubmit="event.preventDefault();">
<label>Enter No of Subjects</label>
<input type="number" id="subject" placeholder="Enter number of subjects">
</form>

<button onclick="CalculateResult()">Calculate Result</button>

<div id="result"></div>

</div>

<script>
function CalculateResult(){

    let n = document.getElementById("subject").value;
    let total = 0;

    for(let i=0;i<n;i++){
        let x = parseFloat(prompt("Enter marks of subject " + (i+1)));
        total += x;
    }

    let average = total/n;
    let grade;

    if(average >= 90){
        grade = "A";
    }
    else if(average >= 75){
        grade = "B";
    }
    else if(average >= 50){
        grade = "C";
    }
    else{
        grade = "F";
    }

    let result = (average >= 40) ? "Pass" : "Fail";

    document.getElementById("result").innerHTML =
        "Total Marks: " + total + "<br>" +
        "Average Marks: " + average + "<br>" +
        "Grade: " + grade + "<br>" +
        "Result: " + result;
}
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    width:340px;
    padding:20px;
    background:#fff;
    border-radius:10px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h1{margin-bottom:10px;color:#333;}

label{font-weight:bold;}

input{
    width:100%;
    padding:8px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#667eea;
    color:#fff;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{background:#5a67d8;}

#result{
    margin-top:10px;
    padding:10px;
    background:#f4f6ff;
    border-radius:5px;
    font-size:14px;
}
</style>

</body>
</html>
