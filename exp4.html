<!DOCTYPE html>
<html>
<head>
    <title>Hotel Room Booking Form</title>
</head>
<body>

<center>

<h2>HOTEL ROOM BOOKING FORM</h2>

<form>

<table cellpadding="8">

<tr>
    <td>Full Name :</td>
    <td><input type="text" name="name"></td>
</tr>

<tr>
    <td>Email :</td>
    <td><input type="email" name="email"></td>
</tr>

<tr>
    <td>Phone Number :</td>
    <td><input type="tel" name="phone"></td>
</tr>

<tr>
    <td>Check-in Date :</td>
    <td><input type="date" name="checkin"></td>
</tr>

<tr>
    <td>Check-out Date :</td>
    <td><input type="date" name="checkout"></td>
</tr>

<tr>
    <td>Room Type :</td>
    <td>
        <select name="room">
            <option>Single Room</option>
            <option>Double Room</option>
            <option>Deluxe Room</option>
            <option>Suite</option>
        </select>
    </td>
</tr>

<tr>
    <td>Number of Guests :</td>
    <td><input type="number" name="guests"></td>
</tr>

<tr>
    <td>Special Requests :</td>
    <td><textarea rows="3" cols="20"></textarea></td>
</tr>

<tr>
    <td colspan="2" align="center">
        <input type="submit" value="Book Now">
        <input type="reset" value="Reset">
    </td>
</tr>

</table>

</form>

</center>

</body>
</html>
