<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Responsive Time Table</title>
  <link rel="stylesheet" href="ww.css">
</head>
<body>

  <h2>Class Time Table</h2>

  <div class="timetable">
    <div class="cell head">Day</div>
    <div class="cell head">9-10</div>
    <div class="cell head">10-11</div>
    <div class="cell head">11-12</div>
    <div class="cell head">12-1</div>

    <div class="cell head">Mon</div>
    <div class="cell">Math</div>
    <div class="cell">Physics</div>
    <div class="cell">Chemistry</div>
    <div class="cell">English</div>

    <div class="cell head">Tue</div>
    <div class="cell">English</div>
    <div class="cell">Math</div>
    <div class="cell">Physics</div>
    <div class="cell">Chemistry</div>

    <div class="cell head">Wed</div>
    <div class="cell">Chemistry</div>
    <div class="cell">English</div>
    <div class="cell">Math</div>
    <div class="cell">Physics</div>

    <div class="cell head">Thu</div>
    <div class="cell">Physics</div>
    <div class="cell">Chemistry</div>
    <div class="cell">English</div>
    <div class="cell">Math</div>

    <div class="cell head">Fri</div>
    <div class="cell">Math</div>
    <div class="cell">English</div>
    <div class="cell">Physics</div>
    <div class="cell">Chemistry</div>
  </div>

</body>
</html>
