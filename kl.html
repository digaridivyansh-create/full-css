<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clothing App</title>
  <link rel="stylesheet" href="kl.css">
</head>
<body>

  <div class="app">
    <header>
      <h1>StyleMart</h1>
    </header>

    <nav>
      <a href="#">Men</a>
      <a href="#">Women</a>
      <a href="#">Kids</a>
    </nav>

    <section class="products">
      <div class="card">
        <div class="img">T-Shirt</div>
        <p>Casual T-Shirt</p>
        <span>₹499</span>
      </div>

      <div class="card">
        <div class="img">Dress</div>
        <p>Summer Dress</p>
        <span>₹899</span>
      </div>

      <div class="card">
        <div class="img">Jeans</div>
        <p>Blue Jeans</p>
        <span>₹1199</span>
      </div>

      <div class="card">
        <div class="img">Jacket</div>
        <p>Winter Jacket</p>
        <span>₹1999</span>
      </div>
    </section>

    <footer>
      <p>Home | Cart | Profile</p>
    </footer>
  </div>

</body>
</html>
