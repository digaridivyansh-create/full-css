<!DOCTYPE html>
<html>

<head>
<title>Student Result Calculator</title>

<style>

body{
    font-family: Arial;
    background-color: #f2f2f2;
    text-align: center;
}

.container{
    background: white;
    width: 350px;
    margin: 100px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
}

button{
    background-color: blue;
    color: white;
    padding: 8px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover{
    background-color: darkblue;
}

input{
    padding: 5px;
    margin: 10px;
}

#result{
    margin-top: 20px;
    font-weight: bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Student Result Calculator</h2>

<label>Number of Subjects</label><br>
<input type="number" id="subjects"><br>

<button onclick="calculate()">Calculate</button>

<h3 id="result"></h3>

</div>

<script>

function calculate(){

let n = document.getElementById("subjects").value;
let total = 0;

for(let i=1;i<=n;i++){
    let marks = parseFloat(prompt("Enter marks for subject " + i));
    total += marks;
}

let avg = total / n;

let grade;

if(avg>=90) grade="A";
else if(avg>=75) grade="B";
else if(avg>=60) grade="C";
else if(avg>=40) grade="D";
else grade="F";

let result = avg>=40 ? "Pass" : "Fail";

document.getElementById("result").innerHTML =
"Total: " + total +
"<br>Average: " + avg.toFixed(2) +
"<br>Grade: " + grade +
"<br>Result: " + result;

}

</script>

</body>
</html>
